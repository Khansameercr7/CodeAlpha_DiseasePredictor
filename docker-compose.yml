version: '3.8'

services:
  api:
    build: .
    container_name: disease_prediction_api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./trained_models:/app/trained_models
      - ./reports:/app/reports
    command: uvicorn deployment.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  dashboard:
    build: .
    container_name: disease_prediction_dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./trained_models:/app/trained_models
      - ./reports:/app/reports
    command: streamlit run deployment/frontend/app.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - api

volumes:
  models:
  reports:
